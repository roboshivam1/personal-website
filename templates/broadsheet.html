<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ SITE.name }}{% endblock %}</title>
  <meta name="description" content="{{ description|default(SITE.description) }}">
  <meta property="og:title" content="{{ self.title() }}">
  <meta property="og:description" content="{{ description|default(SITE.description) }}">
  <link rel="alternate" type="application/rss+xml" title="{{ SITE.name }}" href="/rss.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..600;1,8..60,400&family=Encode+Sans+Condensed:wght@400;600&family=JetBrains+Mono:wght@400&display=swap">
  <link rel="stylesheet" href="/paper.css">
</head>
<body>
<div class="sheet">
  <header>
    <div class="folio">
      <span>Vol. I &middot; No. {{ issue_number(today) }}</span>
      <span>{{ SITE.city }} &middot; {{ today|long_date }}</span>
      <span>Est. {{ SITE.established }}</span>
    </div>
    <hr class="rule rule--hair">
    <div class="masthead">
      <h1 class="masthead__name"><a href="/">{{ SITE.name }}</a></h1>
      <hr class="masthead__rule">
      <p class="masthead__motto">{{ SITE.motto }}</p>
    </div>
    <nav class="nav" aria-label="Sections">
      {% for label, href in SITE.nav %}
      <a href="{{ href }}"{% if href == path %} aria-current="page"{% endif %}>{{ label }}</a>
      {% endfor %}
    </nav>
  </header>

  <main>
{% block main %}{% endblock %}
  </main>

  <footer class="folio" style="margin-top:4rem;border-top:3px double var(--ink);padding-top:.8rem">
    <span>Set in Bodoni &amp; Source Serif</span>
    <span>Printed in {{ SITE.city }}
