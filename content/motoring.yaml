- name: Custom Camaro
  issued: 1968
  acquired: 2019-08
  image: /img/cars/custom-camaro.png
  series: Redline
  description: >
    The first one. Paint is spectraflame lime, chipped at the nearside rear
    where it met a skirting board at speed. Axles remain true. Handling has not
    been assessed, the test track being a kitchen table.

- name: Twin Mill
  issued: 1969
  acquired: 2021-03
  image: /img/cars/twin-mill.png
  series: Redline
  description: >
    Two engines, no discernible reason. This paper considers that sufficient
    reason. Acquired at a price the editor declines to disclose.

- name: Bone Shaker
  issued: 2006
  acquired: 2023-11
  image: /img/cars/bone-shaker.png
  description: >
    Modern, and none the worse for it. The skull grille is the sort of decision
    a committee would have removed.

- name: Rodger Dodger
  issued: 1974
  acquired: 2024-06
  image: /img/cars/rodger-dodger.png
  description: >
    Bought damp from a Sunday market in Jaipur for less than a cup of tea.
    Cleaned up better than it had any right to.

- name: Deora II
  issued: 2000
  acquired: 2025-02
  image: /img/cars/deora-ii.png
  description: >
    Carries two surfboards it will never use. The editor sympathises.

- name: "'57 Chevy"
  issued: 1977
  acquired: 2026-05
  image: /img/cars/57-chevy.png
  series: Redline
  description: >
    The most recent arrival. Blown engine through the bonnet, as the era
    demanded. Still smells faintly of somebody else's cupboard.