# The critic. Placeholder picks — replace with yours.
#
# kind   film | book | record   (decides which desk it prints under)
# title  what it is
# by     director / author / artist
# year   optional
# note   the verdict. one line. deadpan. this is the whole section.
# star   optional, true for the standing recommendation

- kind: film
  title: Smallville
  by: Alfred Gough
  year: 2001
  star: true
  note: Based on the story of Clark Kent's teenage years before becoming Superman.
    Really cool balance in multiple story aspects.

- kind: film
  title: Rush Hour
  by: Jackie Chan, Chris Tucker
  year: 1998
  note: Nothing happens twice, beautifully.

- kind: film
  title: Ra.One
  by: Shah Rukh Khan
  year: 2011
  note: I love superheroes, I love bollywood, I love gamedev. I rarely admit 
    but this one's my actual favourite.

- kind: film
  title: Iron Man
  by: Robert Downey Jr., Jon Favreau 
  year: 2011
  note: The classic! Heavily inspiring and the film that got me listening rock.

- kind: book
  title: Moonwalk
  by: Michael Jackson
  year: 1988
  note: Had a rare genuine tone in it.

- kind: book
  title: In Search of Schrodinger's Cat
  by: John Gribbin
  year: 1984
  note: The true complete story of development of Quantum Mechanics. Was pretty
    hard for me to understand initially tho.

- kind: book
  title: The Man Who Bent Light
  by: Narinder Singh Kapany
  year: 2021
  note: Autobiography of the father of Fibre Optics. Perfectly captures development
    of technology in early India.

- kind: book
  title: Shah Rukh Khan - Legend, Icon, Star
  by: Mohar Basu
  year: 2024
  note: Who doesn't like reading about bollywood c'mon. Plus SRK is my favourite.

- kind: book
  title: Zen and the Art of Motorcycle Maintenance
  by: Robert Pirsig
  year: 1974
  note: Half of it is about a motorcycle. The other half is also about a
    motorcycle.

- kind: book
  title: The Creativity Code
  by: Marcus Du Sautoy
  year: 2019
  star: True
  note: Rationally thought-provoking to say the least. Dismissing the Turing test,
    championing the Lovelace test.

- kind: record
  title: Highway To Hell
  by: AC/DC
  year: 1979
  note: Soldering music. The bench agrees.

- kind: record
  title: Rubberband Man
  by: The Spinners
  year: 1977
  star: true
  note: Peter Quill music is the best music.

- kind: record
  title: Piano Man
  by: Billy Joel
  year: 1973
  note: The best part is the irony - The most recognisable tune of the song
    is on Harmonica.

- kind: record
  title: Bad
  by: Michael Jackson
  year: 1987
  note: This one is pure history.

- kind: record
  title: O Sanam
  by: Lucky Ali
  year: 1996
  note: Generationally passed down music.